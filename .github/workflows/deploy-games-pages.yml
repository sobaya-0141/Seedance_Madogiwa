name: Deploy games to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-games-pages.yml"
      - "GAMES_PORTAL/**"
      - "04_GAME_ASSETS/voxel/models/**"
      - "05_OFFICE_CRASH_GAME/**"
      - "07_SOBA_ESCAPE_GAME/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            05_OFFICE_CRASH_GAME/package-lock.json
            07_SOBA_ESCAPE_GAME/package-lock.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build game arcade
        run: node GAMES_PORTAL/scripts/build-pages.mjs

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist-pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
